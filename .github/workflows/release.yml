name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  create-tag:
    name: Create Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get version from package.json
        id: package-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Package version: ${VERSION}"
      
      - name: Check if tag exists
        id: check-tag
        run: |
          TAG="v${{ steps.package-version.outputs.VERSION }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG does not exist"
          fi
      
      - name: Create and push tag
        if: steps.check-tag.outputs.exists == 'false'
        id: tag
        run: |
          VERSION="${{ steps.package-version.outputs.VERSION }}"
          TAG="v${VERSION}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Created and pushed tag: $TAG"
      
      - name: Use existing tag
        if: steps.check-tag.outputs.exists == 'true'
        id: existing-tag
        run: |
          VERSION="${{ steps.package-version.outputs.VERSION }}"
          TAG="v${VERSION}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Using existing tag: $TAG"

  build:
    name: Build on ${{ matrix.os }}
    needs: create-tag
    if: needs.create-tag.outputs.tag != ''
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-tag.outputs.tag }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25.9.0'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build web assets
        run: npm run build
      
      - name: Build Electron app for Linux
        if: matrix.platform == 'linux'
        run: npm run package:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build Electron app for Windows
        if: matrix.platform == 'windows'
        run: npm run package:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build Electron app for macOS
        if: matrix.platform == 'macos'
        run: npm run package:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
      
      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/*.rpm
          retention-days: 7
      
      - name: Upload Windows artifacts
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: dist-electron/*.exe
          retention-days: 7
      
      - name: Upload macOS artifacts
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip
          retention-days: 7

  release:
    name: Create Release
    needs: [create-tag, build]
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-tag.outputs.tag }}
      
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-builds
          path: release-artifacts/linux
      
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: release-artifacts/windows
      
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-builds
          path: release-artifacts/macos
      
      - name: Generate checksums
        run: |
          cd release-artifacts
          find . -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.exe" -o -name "*.dmg" -o -name "*.zip" \) -exec sha256sum {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt
      
      - name: Generate release notes
        run: |
          cat > release_notes.md << 'EOF'
          ## IBM CC Contract Builder ${{ needs.create-tag.outputs.version }}
          
          ### Downloads
          
          #### Linux
          - **AppImage**: Universal Linux package (recommended)
          - **DEB**: Debian/Ubuntu package
          - **RPM**: Red Hat/Fedora/CentOS package
          
          #### Windows
          - **NSIS Installer**: Standard Windows installer
          - **Portable**: Standalone executable
          
          #### macOS
          - **DMG**: macOS disk image (Intel and Apple Silicon)
          - **ZIP**: Compressed application bundle
          
          ### Installation
          
          **Linux:**
          
          AppImage:
          ```bash
          chmod +x IBM-CC-Contract-Builder-*.AppImage
          ./IBM-CC-Contract-Builder-*.AppImage
          ```
          
          DEB:
          ```bash
          sudo dpkg -i IBM-CC-Contract-Builder-*.deb
          ```
          
          RPM:
          ```bash
          sudo rpm -i IBM-CC-Contract-Builder-*.rpm
          ```
          
          **Windows:**
          Run the installer or portable executable
          
          **macOS:**
          Open DMG and drag to Applications, or extract ZIP
          
          ### Verification
          Verify downloads using SHA256SUMS.txt
          
          ### Changes
          See commit history for detailed changes in this release.
          EOF
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-tag.outputs.tag }}
          name: Release ${{ needs.create-tag.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            release-artifacts/**/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}