name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: windows
            arch: x64
          - os: macos-latest
            platform: macos
            arch: universal
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25.9.0'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build web assets
        run: npm run build
      
      - name: Build Electron app for Linux
        if: matrix.platform == 'linux'
        run: npm run package:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build Electron app for Windows
        if: matrix.platform == 'windows'
        run: npm run package:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build Electron app for macOS
        if: matrix.platform == 'macos'
        run: npm run package:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
      
      - name: List build artifacts
        shell: bash
        run: |
          echo "Contents of dist-electron directory:"
          ls -la dist-electron/ || echo "No dist-electron directory found"
      
      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/*.rpm
          retention-days: 7
          if-no-files-found: error
      
      - name: Upload Windows artifacts
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            dist-electron/*.exe
          retention-days: 7
          if-no-files-found: error
      
      - name: Upload macOS artifacts
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip
          retention-days: 7
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-builds
          path: release-artifacts/linux
      
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: release-artifacts/windows
      
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-builds
          path: release-artifacts/macos
      
      - name: List all artifacts
        run: |
          echo "All release artifacts:"
          find release-artifacts -type f -exec ls -lh {} \;
      
      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Release version: ${VERSION}"
      
      - name: Generate checksums
        run: |
          cd release-artifacts
          find . -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.exe" -o -name "*.dmg" -o -name "*.zip" \) -exec sha256sum {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt
      
      - name: Generate release notes
        id: release_notes
        run: |
          cat > release_notes.md << 'EOF'
          ## IBM CC Contract Builder ${{ steps.version.outputs.VERSION }}
          
          ### Downloads
          
          #### Linux
          - **AppImage**: Universal Linux package (recommended)
          - **DEB**: Debian/Ubuntu package
          - **RPM**: Red Hat/Fedora/CentOS package
          
          #### Windows
          - **NSIS Installer**: Standard Windows installer with uninstaller
          - **Portable**: Standalone executable (no installation required)
          
          #### macOS
          - **DMG**: macOS disk image for Intel and Apple Silicon
          - **ZIP**: Compressed application bundle
          
          ### Installation Instructions
          
          #### Linux
          
          **AppImage:**
          ```bash
          chmod +x IBM-CC-Contract-Builder-*.AppImage
          ./IBM-CC-Contract-Builder-*.AppImage
          ```
          
          **DEB (Debian/Ubuntu):**
          ```bash
          sudo dpkg -i IBM-CC-Contract-Builder-*.deb
          sudo apt-get install -f  # Install dependencies if needed
          ```
          
          **RPM (Red Hat/Fedora/CentOS):**
          ```bash
          sudo rpm -i IBM-CC-Contract-Builder-*.rpm
          # or
          sudo dnf install IBM-CC-Contract-Builder-*.rpm
          ```
          
          #### Windows
          
          **Installer:**
          1. Download and run the `.exe` installer
          2. Follow the installation wizard
          3. Launch from Start Menu or Desktop shortcut
          
          **Portable:**
          1. Download the portable `.exe`
          2. Run directly without installation
          
          #### macOS
          
          **DMG:**
          1. Download and open the `.dmg` file
          2. Drag the application to the Applications folder
          3. Launch from Applications or Launchpad
          
          **ZIP:**
          1. Download and extract the `.zip` file
          2. Move the application to Applications folder
          3. Right-click and select "Open" on first launch (Gatekeeper)
          
          ### System Requirements
          
          - **Linux**: Ubuntu 18.04+, Debian 10+, Fedora 32+, or equivalent
          - **Windows**: Windows 10 (64-bit) or later
          - **macOS**: macOS 10.15 (Catalina) or later
          - **Memory**: 4 GB RAM minimum, 8 GB recommended
          - **Disk Space**: 500 MB free space
          
          ### Verification
          
          Verify the integrity of downloaded files using SHA256 checksums (if provided).
          
          ### What's New
          
          See [CHANGELOG.md](CHANGELOG.md) for detailed changes in this release.
          
          ### Support
          
          - **Issues**: Report bugs or request features on [GitHub Issues](https://github.com/${{ github.repository }}/issues)
          - **Documentation**: See [README.md](README.md) for usage instructions
          
          ---
          
          **Note**: This is an open-source project. Contributions are welcome!
          EOF
          
          echo "Release notes generated successfully"
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            release-artifacts/linux/*
            release-artifacts/windows/*
            release-artifacts/macos/*
            release-artifacts/SHA256SUMS.txt
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}