name: Bug Report
description: Report a bug or unexpected behavior in contract-ui
title: "[Bug]: "
labels: ["bug", "triage"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below with as much detail as possible to help us investigate and fix the issue.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please verify these before submitting your bug report
      options:
        - label: I have searched [existing issues](https://github.com/ibm-hyper-protect/contract-ui/issues) to avoid duplicates
          required: true
        - label: I am using the latest version of contract-ui
          required: true
        - label: I have read the [README](https://github.com/ibm-hyper-protect/contract-ui/blob/main/README.md)
          required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: Describe the issue you're experiencing...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the behavior
      placeholder: |
        1. Open the application
        2. Log in as role '...'
        3. Navigate to '...'
        4. Click on '...'
        5. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe what you expected to happen...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe what actually happened...
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error Message / Console Output
      description: If applicable, paste the complete error message or console output (open DevTools with Ctrl+Shift+I)
      render: shell
      placeholder: Paste error message or output here...

  - type: input
    id: app-version
    attributes:
      label: Application Version
      description: Found in the title bar or About screen
      placeholder: "1.1.1"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: What OS are you running on?
      placeholder: "macOS 14.0, Ubuntu 22.04, Windows 11"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version (if running from source)
      description: Output of `node --version`
      placeholder: "v25.9.0"

  - type: dropdown
    id: persona
    attributes:
      label: Active Persona / Role
      description: Which role were you logged in as when the bug occurred?
      options:
        - Admin
        - Solution Provider
        - Data Owner
        - Environment Operator
        - Auditor
        - Viewer
        - Not applicable / No login
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (screenshots, logs, etc.)
      placeholder: Any additional information that might help us debug this issue...

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      description: Are you willing to help fix this bug?
      options:
        - label: I would be willing to submit a PR to fix this bug
